server:
  port: 8584

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/wigell_padel_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Europe/Stockholm
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: Europe/Stockholm
    show-sql: false
  main:
    banner-mode: "off"
    log-startup-info: false

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: ERROR
    com.simon.wigellpadel: INFO

app:
  exchange:
    sek-to-eur: 0.1
    eur-to-sek: 10.0
